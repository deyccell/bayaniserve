<!DOCTYPE html>
<html lang="fil">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Center Chatbot — Hilamonan / Camugao / Inapoy</title>
<style>
  :root {
    --bg: #FAF7F0;
    --surface: #FFFFFF;
    --border: #E3DDD0;
    --teal: #0F6E5E;
    --teal-dark: #0B5247;
    --teal-tint: #E3F1ED;
    --marigold: #E8A33D;
    --text: #1B2A28;
    --text-muted: #5C6F6B;
    --danger: #B0432E;
    --radius: 14px;
    font-size: 16px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, sans-serif;
  }

  .app {
    max-width: 640px;
    margin: 0 auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    box-shadow: 0 0 40px rgba(15, 110, 94, 0.06);
  }

  /* ---------- Header ---------- */
  header {
    background: var(--teal);
    color: white;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-text .eyebrow {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.75;
    font-weight: 600;
  }

  .header-text h1 {
    font-size: 18px;
    margin: 2px 0 0;
    font-weight: 700;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    background: rgba(255,255,255,0.12);
    padding: 6px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ffd166;
    transition: background 0.2s;
  }
  .status-dot.online { background: #5BD99B; }
  .status-dot.offline { background: #FF8A73; }

  /* ---------- Disclaimer ---------- */
  .disclaimer {
    background: #FFF6E8;
    border-bottom: 1px solid var(--border);
    color: #6B4E1E;
    font-size: 12.5px;
    line-height: 1.4;
    padding: 10px 20px;
    flex-shrink: 0;
  }

  /* ---------- Messages ---------- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg {
    max-width: 82%;
    padding: 11px 15px;
    border-radius: var(--radius);
    line-height: 1.45;
    font-size: 15.5px;
    white-space: pre-wrap;
  }

  .msg.bot {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--teal);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg.error {
    align-self: center;
    background: #FBEAE6;
    color: var(--danger);
    border: 1px solid #F1C4B8;
    font-size: 13.5px;
    text-align: center;
  }

  .typing {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    padding: 13px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    opacity: 0.5;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-4px); opacity: 1; }
  }

  /* ---------- Suggestion chips ---------- */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 20px 14px;
    flex-shrink: 0;
  }

  .chip {
    border: 1px solid var(--teal);
    color: var(--teal-dark);
    background: var(--teal-tint);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 13.5px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .chip:hover { background: #D4EAE3; }
  .chip:active { transform: scale(0.97); }

  /* ---------- Input ---------- */
  .input-row {
    display: flex;
    gap: 10px;
    padding: 14px 20px 18px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .input-row input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 13px 18px;
    font-size: 15.5px;
    outline: none;
    font-family: inherit;
  }
  .input-row input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-tint);
  }

  .input-row button {
    background: var(--marigold);
    color: #4A2F05;
    border: none;
    border-radius: 999px;
    padding: 0 24px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    min-width: 44px;
    transition: filter 0.15s;
  }
  .input-row button:hover { filter: brightness(0.95); }
  .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  .input-row button:focus-visible,
  .chip:focus-visible {
    outline: 3px solid var(--teal-dark);
    outline-offset: 2px;
  }

  /* Scrollbar (subtle) */
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 999px;
  }

  @media (max-width: 480px) {
    .app { max-width: 100%; }
    .msg { max-width: 88%; }
  }
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="header-text">
      <div class="eyebrow">Barangay Health Center</div>
      <h1>Hilamonan · Camugao · Inapoy</h1>
    </div>
    <div class="status-pill">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Checking…</span>
    </div>
  </header>

  <div class="disclaimer">
    Ang chatbot na ini para sa impormasyon lang. Indi ini pagbuylog sa tambal nga
    iginhatag sang doktor. Kon emergency, magtawag dayon sa health center o pumunta
    sa pinakamalapit nga ospital.
  </div>

  <div class="messages" id="messages" aria-live="polite"></div>

  <div class="chips" id="chips">
    <button class="chip" data-q="May Paracetamol bala dira sa health center?">May Paracetamol?</button>
    <button class="chip" data-q="Ano ang oras sang health center?">Oras sang health center</button>
    <button class="chip" data-q="Paano mag-reserve sang gamot?">Paano mag-reserve</button>
    <button class="chip" data-q="May bakunahan bala karon?">Bakunahan schedule</button>
  </div>

  <div class="input-row">
    <input
      type="text"
      id="userInput"
      placeholder="Itype ang imo pangutana…"
      autocomplete="off"
    />
    <button id="sendBtn">Send</button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const chipsEl = document.getElementById('chips');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  // Full conversation sent to the backend each turn.
  // The system prompt itself lives in the Ollama Modelfile, not here.
  let history = [];

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage(text) {
    if (!text.trim()) return;

    chipsEl.style.display = 'none';
    addMessage('user', text);
    history.push({ role: 'user', content: text });
    inputEl.value = '';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      hideTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addMessage('error', err.detail || 'Sori, may problema sa koneksyon.');
        return;
      }

      const data = await res.json();
      addMessage('bot', data.reply);
      history.push({ role: 'assistant', content: data.reply });

    } catch (e) {
      hideTyping();
      addMessage('error', 'Indi ma-reach ang server. Siguraduha nga nagarun ang backend.');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', () => sendMessage(inputEl.value));
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage(inputEl.value);
  });

  chipsEl.querySelectorAll('.chip').forEach((chip) => {
    chip.addEventListener('click', () => sendMessage(chip.dataset.q));
  });

  async function checkHealth() {
    try {
      const res = await fetch('/api/health');
      const data = await res.json();
      if (data.ollama_reachable && data.model_available) {
        statusDot.className = 'status-dot online';
        statusText.textContent = 'Online';
      } else if (data.ollama_reachable) {
        statusDot.className = 'status-dot offline';
        statusText.textContent = 'Model not found';
      } else {
        statusDot.className = 'status-dot offline';
        statusText.textContent = 'Ollama offline';
      }
    } catch (e) {
      statusDot.className = 'status-dot offline';
      statusText.textContent = 'Backend offline';
    }
  }

  checkHealth();
  setInterval(checkHealth, 15000);

  // Welcome message
  addMessage('bot', 'Kumusta! Ako ang chatbot sang health center sang Hilamonan, Camugao, kag Inapoy. Pamangkutan lang kon ano imo kinahanglan — gamot, reservation, oras, ukon bakunahan.');
</script>

</body>
</html>
